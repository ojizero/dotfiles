# Branded error pages for void-catchall (unmatched routes only). SSI inlines
# assets into *.html so pages are self-contained when served as fallbacks.
#   <style><!--#include virtual="/assets/style.css" --></style>
#   <script><!--#include virtual="/assets/particles.js" --></script>
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    error_page 404 /404.html;

    location ^~ /assets/ {
        try_files $uri =404;
    }

    # Direct /{status}.html requests (e.g. future middleware use) — SSI on.
    location ~ "^/[0-9][0-9][0-9]\.html$" {
        ssi on;
        try_files $uri /default.html;
    }

    location = /default.html {
        ssi on;
        internal;
    }

    # Catch-all backend for unmatched hosts
    location / {
        return 404;
    }
}
