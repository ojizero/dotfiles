# Static set of routers and services for Traefik to proxy
# - Custom void-themed error pages (see static/errors/nginx.conf).
# - Catch-all router for unmatched hosts → 404 error page.
# - DSM's own interface.
# - AdGuard's DNS-over-HTTPS/TLS/QUIC.
http:
  middlewares:
    error-pages:
      errors:
        # Whitelist only statuses with custom pages. Broad ranges break apps that
        # use special 4xx semantics (401 + WWW-Authenticate, 409 + session ID).
        status:
          - "400"
          - "403"
          - "404"
          - "408"
          - "429"
          - "500-504"
          - "505-599"
        service: errors
        query: "/{status}.html"
        errorRequestHeaders: []

  routers:
    void-catchall:
      entryPoints:
        - web-secure
      rule: PathPrefix(`/`)
      priority: 1
      service: errors

    dsm:
      entryPoints:
        - web-secure
      rule: >-
        Host("atlas.ojizero.dev")
        || Host("atlas.tn.ojizero.dev")
        || Host("atlas.ln.ojizero.dev")
      service: dsm

    dns:
      entryPoints:
        - web-secure
      rule: >-
        Host("d.ojizero.dev")
        || Host("d.tn.ojizero.dev")
        || Host("d.ln.ojizero.dev")
      service: dns

  services:
    errors:
      loadbalancer:
        passHostHeader: false
        servers:
          - url: http://errors:80

    dsm:
      loadbalancer:
        servers:
          - url: http://host.docker.internal:5000

    dns:
      loadbalancer:
        servers:
          - url: http://host.docker.internal:3000
