# Static set of routers and services for Traefik to proxy.
#
# Error-page boundary (Traefik OSS): custom pages apply only to requests that
# match no higher-priority router (void-catchall → errors nginx). Matched
# routers pass backend responses through unchanged, including 401 + WWW-Authenticate
# from basicAuth and application-specific 4xx/5xx bodies. Traefik OSS cannot
# style proxy-side 502/503 on matched routes without also replacing same-status
# backend responses, so those remain Traefik's native errors.
#
# - void-catchall: unmatched HTTPS hosts/paths → branded 404 (static/errors/).
# - dsm: Synology DSM interface.
# - dns: AdGuard DNS-over-HTTPS/TLS/QUIC.
http:
  routers:
    void-catchall:
      entryPoints:
        - web-secure
      rule: PathPrefix(`/`)
      priority: 1
      service: errors

    dsm:
      entryPoints:
        - web-secure
      rule: >-
        Host("atlas.ojizero.dev")
        || Host("atlas.tn.ojizero.dev")
        || Host("atlas.ln.ojizero.dev")
      service: dsm

    dns:
      entryPoints:
        - web-secure
      rule: >-
        Host("d.ojizero.dev")
        || Host("d.tn.ojizero.dev")
        || Host("d.ln.ojizero.dev")
      service: dns

  services:
    errors:
      loadbalancer:
        passHostHeader: false
        servers:
          - url: http://errors:80

    dsm:
      loadbalancer:
        servers:
          - url: http://host.docker.internal:5000

    dns:
      loadbalancer:
        servers:
          - url: http://host.docker.internal:3000
