[tools]

bun = "1.3.11"
erlang = "28"
elixir = "1.19.5-otp-28"

# Langauge servers
elixir-ls = "latest"
lua-language-server = "latest"
"npm:bash-language-server" = "latest"
"npm:yaml-language-server" = "latest"
"npm:vscode-langservers-extracted" = "latest"
"github:WhatsApp/erlang-language-platform" = "latest"

# Required to get NPM based tools to be installable even if the tools
# aren't reliant on Node. Main JS runtime is not Node is still Bun.
node = "lts"

[env]

MISE_ENV_FILE=".env"
ERL_AFLAGS = "-kernel shell_history enabled"

# Disable OMO's Posthog integration
OMO_DISABLE_POSTHOG=1
OMO_SEND_ANONYMOUS_TELEMETRY=0

[settings]

npm.package_manager = "bun"
